<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessLens Ultra - Error Diagnostic</title>
    <style>
        body {
            font-family: monospace;
            background: #0f0e0c;
            color: #81b64c;
            padding: 20px;
        }

        h1 {
            color: #81b64c;
        }

        .error {
            color: #ff4444;
            background: #1a0000;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ff4444;
            border-radius: 5px;
        }

        .log {
            color: #81b64c;
            background: #001a00;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #81b64c;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <h1>ChessLens Diagnostic Page</h1>
    <p>This page will help us diagnose the black screen issue.</p>
    <div id="status">Loading...</div>
    <div id="logs"></div>

    <script>
        const logsDiv = document.getElementById('logs');
        const statusDiv = document.getElementById('status');

        // Capture all console messages
        const originalLog = console.log;
        const originalError = console.error;

        console.log = function (...args) {
            originalLog.apply(console, args);
            const logDiv = document.createElement('div');
            logDiv.className = 'log';
            logDiv.textContent = 'LOG: ' + args.join(' ');
            logsDiv.appendChild(logDiv);
        };

        console.error = function (...args) {
            originalError.apply(console, args);
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = 'ERROR: ' + args.join(' ');
            logsDiv.appendChild(errorDiv);
        };

        // Check if all dependencies are loaded
        console.log('Checking dependencies...');
        console.log('React:', typeof React);
        console.log('ReactDOM:', typeof ReactDOM);
        console.log('htm:', typeof htm);
        console.log('Chess:', typeof Chess);
        console.log('ChessBoard:', typeof ChessBoard);
        console.log('lucide:', typeof lucide);

        statusDiv.textContent = 'Dependencies checked. See logs above.';

        // Try loading the main app
        console.log('Now open index.html and check the console for errors when you make a move.');
    </script>
</body>

</html>
