<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessLens PRO - Premium Analysis (Local Edition)</title>
    <!-- Tailwind CSS (Play CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        chess: {
                            dark: '#262421',
                            light: '#312e2b',
                            accent: '#81b64c',
                            hover: '#a3d160',
                            danger: '#fa412d',
                            warning: '#f6b40e',
                            info: '#27749f',
                        }
                    },
                    boxShadow: {
                        'glow': '0 0 20px rgba(129, 182, 76, 0.4)',
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <!-- Chessboard.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <!-- Main styles -->
    <link rel="stylesheet" href="css/main.css">
</head>

<body class="dark overflow-x-hidden antialiased">
    <div id="root"></div>

    <!-- Dependencies (Standard UMD versions for file:// compatibility) -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- HTM: Allows JSX-like syntax in Vanilla JS (No Babel fetch needed!) -->
    <script src="https://unpkg.com/htm/dist/htm.umd.js"></script>
    <!-- Stable Chess.js (UMD) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <!-- App Logic -->
    <script src="js/app.js"></script>
</body>

</html>
